<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo Prenotazione - Scienze MMFFNN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            /* Applichiamo il font monospaziato */
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace; 
            background-color: #f4fcf4; /* Un verde chiarissimo e neutro per lo sfondo */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-btn { 
            /* IL TUO VERDE per il testo e il bordo del bottone Indietro */
            color: #0a5c0a; 
            border: 2px solid #0a5c0a;
            background-color: transparent;
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1em;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .back-btn:hover { 
            /* IL TUO VERDE come sfondo quando ci passi sopra */
            background-color: #0a5c0a; 
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(10, 92, 10, 0.2);
        }

        .form-container { 
            width: 100%; 
            max-width: 800px; 
            background: white; 
            border-radius: 12px; 
            /* Ombra col tuo verde per richiamare la pagina principale */
            box-shadow: 0 10px 30px rgba(10, 92, 10, 0.15); 
            height: 900px; /* Altezza per il form, aumentala se il form è lungo */
            overflow: hidden; 
            position: relative; 
            border: 1px solid #e2e8f0;
        }

        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← Torna alla Home</a>
    </div>

    <div class="form-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfLktf5HYViVIzMhE4J3HKqcbWl3_Mi-31dW9qWjHa8vwm76g/viewform?embedded=true" width="640" height="894" frameborder="0" marginheight="0" marginwidth="0">Caricamento…</iframe>    </div>

</body>
</html>
