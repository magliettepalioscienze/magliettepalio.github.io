<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magliette Palio delle Scienze</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Stile generale e Sfondo Sfumato */
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            /* Puoi cambiare i colori qui sotto se il Palio ha colori specifici! */
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
            color: #333; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        /* La "Card" bianca centrale */
        .card { 
            background: rgba(255, 255, 255, 0.98); 
            max-width: 800px; 
            width: 100%; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            overflow: hidden; 
        }
        
        /* L'intestazione della Card */
        .header { 
            background: #1e293b; 
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.5em; 
            letter-spacing: 1px; 
        }
        .header p { 
            margin: 10px 0 0; 
            font-size: 1.1em; 
            color: #cbd5e1;
        }
        
        /* Contenuto e spazio per il modulo */
        .content { 
            padding: 30px 40px; 
            text-align: center; 
        }
        .content > p {
            margin-bottom: 25px;
            color: #475569;
            line-height: 1.6;
        }
        
        /* Il box dove andrà Google Forms */
        .form-container { 
            width: 100%; 
            height: 800px; /* Altezza del modulo */
            border-radius: 12px; 
            background: #f8fafc; 
            border: 2px dashed #cbd5e1; /* Bordo tratteggiato temporaneo */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            position: relative;
        }
        .form-container iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        .placeholder-text { 
            color: #64748b; 
            font-weight: 600; 
            font-size: 1.2em;
        }

        /* Adattamento per gli schermi piccoli (cellulari) */
        @media (max-width: 600px) {
            .header h1 { font-size: 2em; }
            .content { padding: 20px; }
            .form-container { height: 900px; } /* Più alto sui telefoni per evitare lo scroll doppio */
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Palio delle Scienze 🧬</h1>
            <p>Prenotazione Ufficiale Magliette</p>
        </div>
        
        <div class="content">
            <p>Compila il modulo qui sotto per assicurarti la tua maglietta. <br><strong>L'accesso con Google è richiesto</strong> per confermare la tua identità ed evitare doppie prenotazioni.</p>
            
            <div class="form-container">
                
                <p class="placeholder-text">⏳ Inseriremo qui il modulo di Google...</p>
                
                </div>
        </div>
    </div>

</body>
</html>
