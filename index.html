        /* IL RIQUADRO CENTRALE (LA LOCANDINA) */
        .poster {
            background-color: rgba(255, 255, 255, 0.95); /* Sfondo bianco semi-trasparente */
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            
            /* ECCO IL TUO VERDE: usato per il bordo e l'ombra del riquadro */
            border: 2px solid #0a5c0a; 
            box-shadow: 0 15px 35px rgba(10, 92, 10, 0.3); 
            
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LA FOTO DELLA MAGLIETTA */
        .tshirt-img {
            width: 100%;
            max-width: 280px; /* Larghezza massima della foto */
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* TITOLO E TESTO */
        .poster h1 {
            font-size: 2em;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            
            /* ECCO IL TUO VERDE: usato per il colore del titolo */
            color: #0a5c0a; 
            line-height: 1.1;
        }

        .poster p {
            font-size: 0.95em;
            line-height: 1.5;
            margin: 0 0 30px 0;
            color: #444; /* Grigio scuro per far leggere bene il Lorem Ipsum */
        }

        /* IL BOTTONE */
        .btn {
            /* ECCO IL TUO VERDE: usato come sfondo del bottone */
            background-color: #0a5c0a; 
            color: #ffffff; /* Testo bianco sul bottone verde scuro */
            
            text-transform: uppercase;
            font-weight: 800;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            /* Un verde leggermente più scuro quando ci passi sopra col mouse */
