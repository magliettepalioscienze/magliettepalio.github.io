<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locandina Palio Scienze MMFFNN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* SFONDO DELLA PAGINA */
        body {
            margin: 0;
            /* Qui va la tua immagine Base64 che farà da sfondo a tutto il sito */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAhghQs//YxODxGEK0DUyokvwY2AkwgQA4lwH/x1+tY0AAAAASUVORK5CYII=');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Mantiene lo sfondo fermo se si scorre */
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        /* IL RIQUADRO CENTRALE (LA LOCANDINA) */
        .poster {
            background-color: rgba(255, 255, 255, 0.95); /* Sfondo bianco semi-trasparente */
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            
            /* ECCO IL TUO VERDE: usato per il bordo e l'ombra del riquadro */
            border: 2px solid #0a5c0a; 
            box-shadow: 0 15px 35px rgba(10, 92, 10, 0.3); 
            
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LA FOTO DELLA MAGLIETTA */
        .tshirt-img {
            width: 100%;
            max-width: 280px; /* Larghezza massima della foto */
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* TITOLO E TESTO */
        .poster h1 {
            font-size: 2em;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            
            /* ECCO IL TUO VERDE: usato per il colore del titolo */
            color: #0a5c0a; 
            line-height: 1.1;
        }

        .poster p {
            font-size: 0.95em;
            line-height: 1.5;
            margin: 0 0 30px 0;
            color: #444; /* Grigio scuro per far leggere bene il Lorem Ipsum */
        }

        /* IL BOTTONE */
        .btn {
            /* ECCO IL TUO VERDE: usato come sfondo del bottone */
            background-color: #0a5c0a; 
            color: #ffffff; /* Testo bianco sul bottone verde scuro */
            
            text-transform: uppercase;
            font-weight: 800;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            /* Un verde leggermente più scuro quando ci passi sopra col mouse */
            background-color: #063d06; 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(10, 92, 10, 0.4);
        }
    </style>
</head>
<body>

    <div class="poster">
        
        <img src="https://via.placeholder.com/300x300.png?text=Foto+Maglietta" alt="Maglietta Scienze" class="tshirt-img">

        <h1>Scienze MMFFNN</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.</p>
        
        <a href="prenota.html" class="btn">Prenota Ora</a>
    </div>

</body>
</html>
