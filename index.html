<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magliette Palio Scienze MMFFNN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            
            /* Sfondo Base64: qui ho messo un piccolo pattern di esempio. 
               Sostituisci tutta la stringa tra gli apici singoli con la tua! */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAhghQs//YxODxGEK0DUyokvwY2AkwgQA4lwH/x1+tY0AAAAASUVORK5CYII=');
            
            /* Decommenta questa riga (togli i /* ) se la tua immagine è una foto grande da adattare allo schermo */
            /* background-size: cover; background-position: center; */
            
            background-color: #ecfdf5; /* Verde chiarissimo di fallback */
            color: #333; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.95); /* Sfondo bianco semi-trasparente */
            padding: 50px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(4, 120, 87, 0.2); 
            max-width: 600px; 
            width: 90%; 
        }
        
        h1 { 
            color: #047857; /* Verde scuro stile Scienze */
            font-size: 2.5em; 
            margin-top: 0;
            margin-bottom: 15px; 
            line-height: 1.2;
        }
        
        p { 
            color: #4b5563; 
            font-size: 1.1em; 
            margin-bottom: 40px; 
        }
        
        .btn { 
            background: #10b981; /* Verde smeraldo acceso */
            color: white; 
            text-decoration: none; 
            padding: 18px 40px; 
            font-size: 1.2em; 
            font-weight: 600; 
            border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); 
            transition: all 0.3s ease; 
            display: inline-block; 
        }
        
        .btn:hover { 
            background: #059669; 
            transform: translateY(-3px); 
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.6); 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Palio delle Scienze MMFFNN 🧬</h1>
        <p>Prenota ora la tua maglietta ufficiale. Ricorda: ti servirà accedere con Google per confermare la tua identità.</p>
        
        <a href="prenota.html" class="btn">Prenota la Maglietta 👕</a>
    </div>

</body>
</html>
