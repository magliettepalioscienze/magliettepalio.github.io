<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - Palio Scienze MMFFNN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        /* RESET GLOBALE E STILI BASE */
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            background-image: linear-gradient(rgba(10, 92, 10, 0.85), rgba(10, 92, 10, 0.95)), url('https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-link {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .nav-link:hover { border-bottom: 2px solid #ffffff; opacity: 0.8; }

        /* BANNER */
        .banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
        }

        .banner-text { flex: 1; max-width: 600px; }
        .banner-text h1 { font-size: 3.5em; font-weight: 800; margin: 0 0 15px 0; text-transform: uppercase; }
        .banner-text p { font-size: 1.2em; color: #e2e8f0; }

        /* GRIGLIA PRODOTTI */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }

        .card { 
            background-color: #ffffff; 
            color: #333333; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0,0,0,0.25); }
        .card h3 { font-size: 1.1em; font-weight: 700; margin: 0 0 10px 0; }
        .card .price { font-size: 1.3em; font-weight: 800; color: #0a5c0a; }

        .card-img-container { 
            background-color: #f8fafc; 
            padding: 20px; 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            aspect-ratio: 1 / 1; 
        }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 92, 10, 0.95); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        .modal-content {
            background-color: #ffffff;
            color: #333333;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
        }

        /* FORM */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; font-size: 0.85em; }
        .form-control {
            width: 100%;
            padding: 12px;
            font-family: inherit;
            border: 2px solid #e2e8f0;
            border-radius: 0;
        }
        .form-control:focus { border-color: #0a5c0a; outline: none; }

        .btn-submit {
            background-color: #0a5c0a;
            color: #ffffff;
            border: none;
            padding: 18px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #063d06; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            .products-grid { grid-template-columns: 1fr; }
            .banner-text h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="nav-link">← Torna alla vetrina</a>
            <a href="contatti.html" class="nav-link">Contatti ✉️</a>
        </div>

        <div class="banner">
            <div class="banner-text">
                <h1>Catalogo<br>Palio Scienze</h1>
                <p>Scegli il modello e prenota. Riceverai un <b>codice alfanumerico</b> via email da mostrare al momento del ritiro.</p>
            </div>
        </div>

        <div class="products-grid">
            <div class="card" data-item="Modello Alfa">
                <h3>Modello Alfa</h3>
                <p class="price">€25.00</p>
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&w=400&q=80" alt="Alfa">
                </div>
            </div>
            <div class="card" data-item="Modello Beta">
                <h3>Modello Beta</h3>
                <p class="price">€22.50</p>
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=400&q=80" alt="Beta">
                </div>
            </div>
            <div class="card" data-item="Modello Gamma">
                <h3>Modello Gamma</h3>
                <p class="price">€28.00</p>
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&w=400&q=80" alt="Gamma">
                </div>
            </div>
            <div class="card" data-item="Modello Delta">
                <h3>Modello Delta</h3>
                <p class="price">€24.99</p>
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1562157873-818bc0726f68?auto=format&fit=crop&w=400&q=80" alt="Delta">
                </div>
            </div>
        </div>
    </div>

    <div id="modal-prenotazione" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 style="color:#0a5c0a; text-transform:uppercase;">Prenotazione</h2>
            
            <form id="order-form">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="Nome" class="form-control" required placeholder="Es. Mario">
                </div>
                <div class="form-group">
                    <label>Cognome</label>
                    <input type="text" name="Cognome" class="form-control" required placeholder="Es. Rossi">
                </div>
                <div class="form-group">
                    <label>Email (Essenziale per il codice)</label>
                    <input type="email" name="Contatto" class="form-control" required placeholder="mario.rossi@esempio.it">
                </div>
                <div class="form-group">
                    <label>Modello</label>
                    <select id="item-select" name="Modello Scelto" class="form-control" required>
                        <option value="Modello Alfa">Modello Alfa - €25.00</option>
                        <option value="Modello Beta">Modello Beta - €22.50</option>
                        <option value="Modello Gamma">Modello Gamma - €28.00</option>
                        <option value="Modello Delta">Modello Delta - €24.99</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Taglia</label>
                    <select name="Taglia" class="form-control" required>
                        <option value="S">S</option>
                        <option value="M" selected>M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantità</label>
                    <input type="number" name="Quantita" class="form-control" min="1" max="10" value="1" required>
                </div>
                
                <div class="g-recaptcha" data-sitekey="6Ld4aYksAAAAAEwDuO_1nv_SZDKQSXOJ1FIy32l4" style="margin-bottom: 20px;"></div>

                <button type="submit" class="btn-submit">Conferma e Invia</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal-prenotazione');
        const orderForm = document.getElementById('order-form');
        const itemSelect = document.getElementById('item-select');

        // GESTIONE APERTURA MODAL
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const modelName = card.getAttribute('data-item');
                itemSelect.value = modelName;
                modal.style.display = 'flex';
            });
        });

        // CHIUSURA MODAL
        document.getElementById('close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };

        // INVIO FORM E RICEZIONE CODICE
        orderForm.addEventListener('submit', e => {
            e.preventDefault();
            
            if(grecaptcha.getResponse().length === 0) {
                alert("Per favore, conferma che non sei un robot.");
                return;
            }

            const btn = document.querySelector('.btn-submit');
            btn.innerText = 'Generazione codice...';
            btn.disabled = true;

            // SOSTITUISCI CON IL TUO NUOVO URL DI GOOGLE APPS SCRIPT
            const scriptURL = 'https://script.google.com/macros/s/AKfycbyq4tDeC-PDTMPfSUdZpRK21YudxvJSVWnoZCX9Xc0NmRUsWmbYvVhynYfTOw1uu2xF/exec';

            fetch(scriptURL, { method: 'POST', body: new FormData(orderForm) })
                .then(res => res.text())
                .then(result => {
                    if(result.includes("PS-")) {
                        alert(`PRENOTAZIONE CONFERMATA!\n\nIl tuo codice unico è: ${result}\nControlla la tua email per il riepilogo.`);
                        orderForm.reset();
                        grecaptcha.reset();
                        modal.style.display = 'none';
                    } else {
                        alert("Errore dal server: " + result);
                    }
                })
                .catch(err => alert("Errore di rete: " + err))
                .finally(() => {
                    btn.innerText = 'Conferma e Invia';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
